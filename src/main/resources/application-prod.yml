# 배포용 프로필. 모든 비밀값은 환경변수로 주입합니다.
#
# 필수 환경변수
#   DB_URL, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET
#   KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET
#   OAUTH2_REDIRECT_URI, CORS_ALLOWED_ORIGINS
server:
  # Railway·Render 는 PORT 를 주입합니다. EC2 처럼 없으면 8080 을 씁니다.
  port: ${PORT:8080}

  # HTTPS 종료를 프록시(Nginx·로드밸런서·PaaS)가 대신하는 경우 반드시 필요합니다.
  # 이게 없으면 Spring 이 자기 주소를 http 로 인식해서, 카카오에 보내는
  # redirect_uri 가 http://... 로 만들어지고 KOE006(등록되지 않은 URI)으로 실패합니다.
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.billage: info
    org.hibernate.SQL: warn
