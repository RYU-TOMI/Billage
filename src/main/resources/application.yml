spring:
  application:
    name: billage
  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    time-zone: Asia/Seoul
    default-property-inclusion: always

  servlet:
    multipart:
      # ImageService 의 실제 검증 상한(5MB)과 맞춥니다. 여기가 더 크면 상한을
      # 넘는 파일도 서버가 일단 파싱(메모리/임시디스크 사용)한 뒤에야 거부하게 됩니다.
      max-file-size: 5MB
      max-request-size: 6MB

  # 카카오는 스프링 시큐리티 기본 제공 provider 가 아니라 provider 설정까지 직접 적어야 합니다.
  # client-id / client-secret 은 카카오 개발자센터에서 발급받아 환경변수로 주입하세요.
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            client-id: ${KAKAO_CLIENT_ID:kakao-client-id-not-set}
            client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret-not-set}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            # 카카오 개발자센터 > 카카오 로그인 > 동의항목 에서 켜둔 항목만 넣을 수 있습니다.
            # 설정하지 않은 항목을 넣으면 로그인 시점에 KOE205 로 실패합니다.
            #
            # account_email 은 선택 동의라 사용자가 거부할 수 있습니다.
            # 그 경우 User.email 은 null 로 저장됩니다. (설계상 허용)
            scope: ${KAKAO_SCOPE:profile_nickname,profile_image,account_email}
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  # 운영에서는 반드시 환경변수 JWT_SECRET 으로 덮어쓰세요. (아래 기본값은 로컬 개발 전용)
  secret: ${JWT_SECRET:billage-local-dev-secret-key-do-not-use-in-production-32bytes}
  access-token-validity: 3600000        # 1시간
  refresh-token-validity: 1209600000    # 14일

cors:
  # 배포 시 CORS_ALLOWED_ORIGINS 로 덮어쓰세요.
  # 와일드카드(*)를 쓸 수 있습니다. Vercel 프리뷰 배포는 주소가 매번 바뀌므로 패턴이 필요합니다.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://billage.site,https://www.billage.site,https://*.vercel.app}

app:
  upload:
    # 업로드된 이미지를 저장할 디렉터리. /images/** 로 서빙됩니다.
    # 운영에서는 docker named volume(uploads-data)이 /data/uploads 에 붙습니다.
    # 로컬 기본값 ./uploads 는 .gitignore 처리돼 있습니다.
    dir: ${UPLOAD_DIR:./uploads}

  oauth2:
    # 카카오 로그인이 끝나면 이 주소로 돌려보냅니다.
    #   성공: {redirect-uri}?accessToken=...&refreshToken=...&isNewUser=...
    #   실패: {redirect-uri}?error=social_login_failed
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}

    # 로그인 시작 시 ?redirect_uri= 로 다른 콜백 주소를 지정할 수 있습니다.
    # 배포된 백엔드 하나로 운영과 로컬 개발을 모두 받기 위한 장치입니다.
    #   GET /oauth2/authorization/kakao?redirect_uri=http://localhost:5173/oauth/callback
    #
    # 아래 출처에서 온 주소만 허용합니다. 검증을 빼면 임의 사이트로 토큰이 새어나갑니다.
    allowed-redirect-origins: ${OAUTH2_ALLOWED_REDIRECT_ORIGINS:http://localhost:3000,http://localhost:5173,https://billage.site,https://www.billage.site}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    com.billage: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
