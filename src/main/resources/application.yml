spring:
  application:
    name: billage
  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    time-zone: Asia/Seoul
    default-property-inclusion: always

jwt:
  # 운영에서는 반드시 환경변수 JWT_SECRET 으로 덮어쓰세요. (아래 기본값은 로컬 개발 전용)
  secret: ${JWT_SECRET:billage-local-dev-secret-key-do-not-use-in-production-32bytes}
  access-token-validity: 3600000        # 1시간
  refresh-token-validity: 1209600000    # 14일

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    com.billage: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
