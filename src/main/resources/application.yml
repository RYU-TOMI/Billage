spring:
  application:
    name: billage
  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    time-zone: Asia/Seoul
    default-property-inclusion: always

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    com.billage: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
